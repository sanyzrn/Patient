name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend (TypeScript + Vitest + Build) ──────────────────────────────────
  frontend:
    name: Frontend — typecheck · test · build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─── PHP CodeSniffer ─────────────────────────────────────────────────────────
  php-lint:
    name: PHP — CodeSniffer (WordPress standards)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install Composer dependencies
        working-directory: wordpress-plugin
        run: composer install --no-interaction --prefer-dist

      - name: Register WordPress coding standards
        working-directory: wordpress-plugin
        run: >
          ./vendor/bin/phpcs --config-set installed_paths
          vendor/wp-coding-standards/wpcs,vendor/phpcsstandards/phpcsutils,vendor/phpcsstandards/phpcsextra

      - name: Run PHP CodeSniffer
        working-directory: wordpress-plugin
        # --warning-severity=0 → warnings don't fail CI; only errors do
        run: ./vendor/bin/phpcs --standard=.phpcs.xml --warning-severity=0 -p
